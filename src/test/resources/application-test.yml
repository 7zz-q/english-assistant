spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=INTERVAL,LEVEL,STATUS,YEAR,MONTH,TYPE,DATE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:test-schema.sql

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

jwt:
  secret: test-secret-key-for-unit-tests-2024
  expiration: 604800000

ai:
  dashscope:
    api-key: sk-test-placeholder
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen-plus
    fast-model: qwen-turbo
